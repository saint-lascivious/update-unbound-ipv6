    local-data: "inky.sainternet.xyz. 60 IN A 192.168.1.30"
    local-data: "inky.sainternet.xyz. 60 IN AAAA 2404:4404:441b:db00:ba27:ebff:fea8:bfb3"
    local-data: "inky.sainternet.xyz. 60 IN AAAA fdbf:240d:aa2c:fc90:ba27:ebff:fea8:bfb3"
    local-data: 'inky.sainternet.xyz. 60 IN TXT "inky.sainternet.xyz"'
    local-data: "30.1.168.192.in-addr.arpa. 60 IN PTR inky.sainternet.xyz."
    local-data-ptr: "2404:4404:441b:db00:ba27:ebff:fea8:bfb3 60 inky.sainternet.xyz"
    local-data-ptr: "fdbf:240d:aa2c:fc90:ba27:ebff:fea8:bfb3 60 inky.sainternet.xyz"

    local-data: "clyde.sainternet.xyz. 60 IN A 192.168.1.40"
    local-data: "clyde.sainternet.xyz. 60 IN AAAA 2404:4404:441b:db00:2ecf:67ff:feb8:242a"
    local-data: "clyde.sainternet.xyz. 60 IN AAAA fdbf:240d:aa2c:fc90:2ecf:67ff:feb8:242a"
    local-data: 'clyde.sainternet.xyz. 60 IN TXT "clyde.sainternet.xyz"'
