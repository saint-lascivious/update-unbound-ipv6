    local-data: "55.1.168.192.in-addr.arpa. 60 IN PTR saint-mobile-other.sainternet.xyz."

    local-data: "karmin-mobile.sainternet.xyz. 60 IN A 192.168.1.60"
    local-data: 'karmin-mobile.sainternet.xyz. 60 IN TXT "karmin-mobile.sainternet.xyz"'
    local-data: "60.1.168.192.in-addr.arpa. 60 IN PTR karmin-mobile.sainternet.xyz."

