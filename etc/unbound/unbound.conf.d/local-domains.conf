    local-data: "pinky.sainternet.xyz. 60 IN AAAA fdbf:240d:aa2c:fc90:ba27:ebff:fe05:e5df"
    local-data: 'pinky.sainternet.xyz. 60 IN TXT "pinky.sainternet.xyz"'
    local-data: "20.1.168.192.in-addr.arpa. 60 IN PTR pinky.sainternet.xyz."
