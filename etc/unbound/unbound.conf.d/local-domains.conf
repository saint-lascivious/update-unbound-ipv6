server:
    # Transparent local zone
    local-zone: "sainternet.xyz." transparent

    local-zone: "1.168.192.in-addr.arpa." transparent

    local-data: "sainternet.xyz. 60 IN NS ns1.sainternet.xyz."
    local-data: "sainternet.xyz. 60 IN NS ns2.sainternet.xyz."
    local-data: "sainternet.xyz. 60 IN NS ns3.sainternet.xyz."
    local-data: "sainternet.xyz. 60 IN NS ns4.sainternet.xyz."

    # Pi-hole Relays (VRRP)
    local-data: "ns1.sainternet.xyz. 60 IN A 192.168.1.11"
    local-data: 'ns1.sainternet.xyz. 60 IN TXT "ns1.sainternet.xyz"'
    local-data: "11.1.168.192.in-addr.arpa. 60 IN PTR ns1.sainternet.xyz."

    local-data: "ns2.sainternet.xyz. 60 IN A 192.168.1.22"
    local-data: 'ns2.sainternet.xyz. 60 IN TXT "ns2.sainternet.xyz"'
    local-data: "22.1.168.192.in-addr.arpa. 60 IN PTR ns2.sainternet.xyz."

    # Unbound Relays (VRRP)
    local-data: "ns3.sainternet.xyz. 60 IN A 192.168.1.33"
    local-data: 'ns3.sainternet.xyz. 60 IN TXT "ns2.sainternet.xyz"'
    local-data: "33.1.168.192.in-addr.arpa. 60 IN PTR ns3.sainternet.xyz."

    local-data: "ns4.sainternet.xyz. 60 IN A 192.168.1.44"
    local-data: 'ns4.sainternet.xyz. 60 IN TXT "ns4.sainternet.xyz"'
    local-data: "44.1.168.192.in-addr.arpa. 60 IN PTR ns4.sainternet.xyz."

    # AdGuardHome Relay (VRRP)
    local-data: "agh-relay.sainternet.xyz. 60 IN A 192.168.1.100"
    local-data: 'agh-relay.sainternet.xyz. 60 IN TXT "agh-relay.sainternet.xyz"'
    local-data: "100.1.168.192.in-addr.arpa. 60 IN PTR agh-relay.sainternet.xyz."

    # DNS Subdomain
    local-data: "dns.sainternet.xyz. 60 IN A 119.224.37.118"
    local-data: 'dns.sainternet.xyz. 60 IN TXT "SAINTERNET -- DNS -- Sainternet DNS (local)"'

    # DoT (DNS-over-TLS) SVCB Resource Record
    local-data: "_853._tcp.dns.sainternet.xyz. 60 IN SVCB 1 dns.sainternet.xyz. alpn=dot port=853"

    # DoH (DNS-over-HTTPS, HTTP/2 and HTTP/3) SVCB Resource Records
    local-data: "_443._tcp.dns.sainternet.xyz. 60 IN SVCB 1 dns.sainternet.xyz. alpn=h2,h3 port=443"
    local-data: "_443._udp.dns.sainternet.xyz. 60 IN SVCB 1 dns.sainternet.xyz. alpn=h3 port=443"

    # DoQ (DNS-over-QUIC) SVCB Resource Record
    local-data: "_853._udp.dns.sainternet.xyz. 60 IN SVCB 1 dns.sainternet.xyz. alpn=doq port=853"

    # DDR priority (Optimistic) HTTPS Resource Records
    local-data: "dns.sainternet.xyz. 60 IN HTTPS 1 . alpn=doq port=853"
    local-data: "dns.sainternet.xyz. 60 IN HTTPS 2 . alpn=dot port=853"
    local-data: "dns.sainternet.xyz. 60 IN HTTPS 3 . alpn=h3 port=443"
    local-data: "dns.sainternet.xyz. 60 IN HTTPS 4 . alpn=h2 port=443"

    # Router
    local-data: "router.sainternet.xyz. 60 IN A 192.168.1.1"
    local-data: "router.sainternet.xyz. 60 IN AAAA 2404:4404:441b:db00:aa29:48ff:fe81:34cc"
    local-data: "router.sainternet.xyz. 60 IN TXT router.sainternet.xyz"
    local-data-ptr: "2404:4404:441b:db00:aa29:48ff:fe81:34cc 60 router.sainternet.xyz"

    # Hosts (Static)
    local-data: "blinky.sainternet.xyz. 60 IN A 192.168.1.10"
    local-data: "blinky.sainternet.xyz. 60 IN AAAA 2404:4404:441b:db00:ba27:ebff:fe1f:b127"
    local-data: "blinky.sainternet.xyz. 60 IN AAAA fdbf:240d:aa2c:fc90:ba27:ebff:fe1f:b127"
    local-data: 'blinky.sainternet.xyz. 60 IN TXT "blinky.sainternet.xyz"'
    local-data: "10.1.168.192.in-addr.arpa. 60 IN PTR blinky.sainternet.xyz."
    local-data-ptr: "2404:4404:441b:db00:ba27:ebff:fe1f:b127 60 blinky.sainternet.xyz"
    local-data-ptr: "fdbf:240d:aa2c:fc90:ba27:ebff:fe1f:b127 60 blinky.sainternet.xyz"

    local-data: "pinky.sainternet.xyz. 60 IN A 192.168.1.20"
